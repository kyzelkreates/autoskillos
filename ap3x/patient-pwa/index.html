<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon"     href="../../icons/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32"    href="../../icons/as-favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="192x192"  href="../../icons/as-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512"  href="../../icons/as-512.png"/>
  <link rel="apple-touch-icon" sizes="180x180"       href="../../icons/as-apple-touch.png"/>
  <link rel="apple-touch-icon" sizes="152x152"       href="../../icons/as-152.png"/>
  <link rel="apple-touch-icon" sizes="144x144"       href="../../icons/as-144.png"/>
  <meta name="apple-mobile-web-app-title"            content="AutoSkill OS™"/>
  <meta name="msapplication-TileImage"               content="../../icons/as-144.png"/>
  <meta name="msapplication-TileColor"               content="#0a0a0a"/>
  <meta name="msapplication-square150x150logo"       content="../../icons/as-152.png"/>
  <meta name="msapplication-square310x310logo"       content="../../icons/as-512.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#c9a84c"/>
<meta name="description" content="AutoSkill OS™ Employee Learning PWA — training check-ins, process modules, safety checkpoints, and competency tracking. Powered by 4P3X Intelligent AI™."/>

<title>AutoSkill OS™ — My Training</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="stylesheet" href="./patient.css"/><!-- AutoSkill OS™ employee styles (filename preserved for deployment) -->
</head>
<body class="theme-dark">

<!-- Employee Learning PWA shell — patient-app.js loads all content dynamically -->
<div id="app-root">
  <div id="loading-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:16px;background:#0a0a0a;color:#c9a84c">
    <img src="../../icons/as-logo.png" alt="AutoSkill OS™" style="width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(201,168,76,0.3))"/>
    <div style="font-size:20px;font-weight:800;letter-spacing:-.5px">AutoSkill OS™</div>
    <div style="font-size:13px;color:#888">Loading your training portal…</div>
    <div style="width:48px;height:4px;border-radius:99px;background:#222;overflow:hidden;margin-top:8px">
      <div style="height:100%;background:#c9a84c;border-radius:99px;animation:load 1.2s ease infinite"></div>
    </div>
    <div style="font-size:11px;color:#555;margin-top:4px">Powered by 4P3X Intelligent AI™ · Created by Kyzel Kreates™</div>
    <style>@keyframes load{0%{width:0%}100%{width:100%}}</style>
  </div>
  <div id="onboarding" style="display:none"></div>
  <div id="portal-root" style="display:none"></div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
// ── Service Worker Registration ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./ap3x-sw.js?v=13', { scope: '/' })
      .then(reg => console.log('[AutoSkill SW v7] Registered:', reg.scope))
      .catch(err => console.warn('[AutoSkill SW] Registration failed:', err));
  });
}

// ── PWA Install Prompt Handler ────────────────────────────────────────────────
// Captures the beforeinstallprompt event so we can trigger it from a button
window._asInstallPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  window._asInstallPrompt = e;
  console.log('[AutoSkill] Install prompt ready — calling asRefreshInstallUI if available');
  if (window.asRefreshInstallUI) window.asRefreshInstallUI();
  else {
    // UI not yet rendered — set up a retry
    var retryCount = 0;
    var retryInterval = setInterval(function() {
      retryCount++;
      if (window.asRefreshInstallUI) { window.asRefreshInstallUI(); clearInterval(retryInterval); }
      if (retryCount > 20) clearInterval(retryInterval);
    }, 300);
  }
});

// Triggered by the install button inside patient-app.js UI
window.asPromptInstall = function() {
  if (window._asInstallPrompt) {
    window._asInstallPrompt.prompt();
    window._asInstallPrompt.userChoice.then(function(result) {
      console.log('[AutoSkill] Install result:', result.outcome);
      window._asInstallPrompt = null;
      var btn = document.getElementById('as-install-btn');
      var tip = document.getElementById('as-install-tip');
      if (result.outcome === 'accepted') {
        if (btn) btn.style.display = 'none';
        if (tip) { tip.textContent = '✅ AutoSkill OS™ installed successfully!'; tip.style.display = 'block'; }
      }
    });
  }
};

// Hide install button if already running as standalone PWA
if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
  window.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('as-install-btn');
    if (btn) btn.style.display = 'none';
  });
}

// Fired after successful install
window.addEventListener('appinstalled', function() {
  window._asInstallPrompt = null;
  console.log('[AutoSkill] App installed successfully');
});

// ── Install UI refresh — called by patient-app.js after tab renders ───────────
window.asRefreshInstallUI = function() {
  var banner = document.getElementById('as-install-banner');
  var btn    = document.getElementById('as-install-btn');
  var tip    = document.getElementById('as-install-tip'); // legacy — in progress tab
  var isStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
  if (isStandalone) {
    // Already installed — hide everything
    if (banner) banner.style.display = 'none';
    if (btn)    btn.style.display = 'none';
    if (tip)    tip.style.display = 'none';
  } else if (window._asInstallPrompt) {
    // Prompt available — show the install banner
    if (banner) banner.style.display = 'block';
    if (btn)    btn.style.display = 'flex';
    if (tip)    tip.style.display = 'none';
  } else {
    // No prompt yet — hide banner, show manual tip fallback
    if (banner) banner.style.display = 'none';
    if (btn)    btn.style.display = 'none';
    if (tip)    tip.style.display = 'flex';
  }
};
</script>
<script>
// ── Boot Guard — survives WhatsApp in-app browser + WebView quirks ───────────
// Problem: WhatsApp's in-app browser often fires DOMContentLoaded BEFORE
// patient-app.js has finished loading. The listener inside patient-app.js
// never fires → infinite loading screen.
// Fix: patient-app.js calls window.asBootApp() instead of DOMContentLoaded.
// We call it here if the script has already loaded (readyState check),
// otherwise patient-app.js calls it itself at script end.

window._asBootReady = false;

// Called by patient-app.js at the very end of the file
window.asBootApp = function() {
  if (window._asBootReady) return; // guard against double-call
  window._asBootReady = true;
  clearTimeout(window._asBootTimeout);
  var ls = document.getElementById('loading-screen');
  if (ls) ls.style.display = 'none';

  var profile = null;
  try { profile = JSON.parse(localStorage.getItem('ap3x_profile') || 'null'); } catch(e) {}

  if (!profile) {
    if (typeof buildOnboarding === 'function') {
      buildOnboarding();
      var ob = document.getElementById('onboarding');
      if (ob) ob.style.display = 'block';
    }
  } else {
    if (typeof buildPortal === 'function') {
      buildPortal();
      var pr = document.getElementById('portal-root');
      if (pr) pr.style.display = 'block';
      if (typeof renderAll === 'function') renderAll();
      setTimeout(function(){ if(window.asRefreshInstallUI) window.asRefreshInstallUI(); }, 300);
    }
  }
};

// ── Failsafe timeout — if app hasn't booted in 8s, show retry ───────────────
window._asBootTimeout = setTimeout(function() {
  if (window._asBootReady) return;
  var ls = document.getElementById('loading-screen');
  if (!ls) return;
  ls.innerHTML =
    '<img src="../../icons/as-logo.png" alt="AutoSkill OS™" style="width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(201,168,76,0.3));margin-bottom:16px"/>' +
    '<div style="font-size:18px;font-weight:800;color:#c9a84c;margin-bottom:8px">AutoSkill OS™</div>' +
    '<div style="font-size:13px;color:#888;margin-bottom:20px">Taking longer than expected…</div>' +
    '<button onclick="window.location.reload()" ' +
    'style="padding:12px 28px;background:#c9a84c;color:#000;border:none;border-radius:10px;' +
    'font-size:14px;font-weight:800;cursor:pointer">↺ Tap to reload</button>' +
    '<div style="font-size:11px;color:#555;margin-top:16px">Powered by 4P3X Intelligent AI™ · Created by Kyzel Kreates™</div>';
}, 8000);
</script>

<script id="pwa-script" src="./patient-app.js?v=13"
  onerror="clearTimeout(window._asBootTimeout);
           var ls=document.getElementById('loading-screen');
           if(ls){ ls.innerHTML='<div style=\'font-size:18px;font-weight:800;color:#c9a84c;margin-bottom:8px\'>AutoSkill OS™</div>'+
           '<div style=\'font-size:13px;color:#888;margin-bottom:20px\'>Could not load training app.<br>Check your connection.</div>'+
           '<button onclick=\'window.location.reload()\' style=\'padding:12px 28px;background:#c9a84c;color:#000;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer\'>↺ Tap to reload</button>'; }">
</script>
</body>
</html>
